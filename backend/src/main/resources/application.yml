# DB setting
spring:
  config:
    # import: optional:file:.env[.properties]
        import: file:.env[.properties]
  application:
    name: financeHub
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_HOST}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      schema: financehub
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 200000
      connection-timeout: 30000
#  redis:
#    host: ${REDIS_HOST}
#    port: ${REDIS_PORT}
#    password: ${REDIS_PASSWORD}
#  session:
#    store-type: redis
#    timeout: 1800

# MyBatis
mybatis:
  mapper-locations: classpath:mappers/*.xml

# Server Port
server:
  port: 8080

# Logging
logging:
  level:
    org:
      springframework: INFO
    com:
      example: DEBUG
    root: DEBUG

jwt:
  secret: ${JWT_SECRET}
  access_token_expiration: 900000      # 15분
  refresh_token_expiration: 604800000  # 7일

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}

kis:
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}
  base-url: https://openapi.koreainvestment.com:9443
  ws-url: ws://ops.koreainvestment.com:21000
